<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>三节点供电 + 三条横向梯子线（贴边优化版）</title>

  <script src="https://cdn.jsdelivr.net/npm/gojs@3.0.24/release/go.js"></script>

  <style>
    html, body, #diagramDiv {
      width: 100%;
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="diagramDiv"></div>

<script>
const $ = go.GraphObject.make;

/* ================= Diagram ================= */
const diagram = $(go.Diagram, "diagramDiv", {
  "undoManager.isEnabled": true
});

/* ================= Node ================= */
diagram.nodeTemplate =
  $(go.Node, "Auto",
    { locationSpot: go.Spot.Center },
    new go.Binding("location", "loc", go.Point.parse)
      .makeTwoWay(go.Point.stringify),

    $(go.Shape, "RoundedRectangle", {
      fill: "#fff",
      stroke: "#333",
      strokeWidth: 2
    }),

    $(go.TextBlock, { margin: 10 }, new go.Binding("text", "key"))
  );

/* ================= 单线 Link ================= */
diagram.linkTemplate =
  $(go.Link,
    { selectable: false },
    $(go.Shape, { stroke: "#333", strokeWidth: 2 })
  );

/* ================= Model ================= */
diagram.model = new go.GraphLinksModel(
  [
    { key: "A", loc: "300 80"  },
    { key: "B", loc: "120 300" },
    { key: "C", loc: "480 300" }
  ],
  [
    { from: "A", to: "B" },
    { from: "A", to: "C" }
  ]
);

/* ================= 梯子线 Part ================= */
const ladderPart =
  $(go.Part,
    { selectable: false, layerName: "Foreground" },
    $(go.Shape, {
      name: "LADDER",
      stroke: "red",
      strokeWidth: 3
    })
  );
diagram.add(ladderPart);

/* ================= 参数 ================= */
const LADDER_T_VALUES = [0.22, 0.27, 0.32];
const TOUCH_OFFSET = 3; // 梯子端点“贴边”微调距离（像素）

/* ================= 工具 ================= */
function lerp(p1, p2, t) {
  return new go.Point(
    p1.x + (p2.x - p1.x) * t,
    p1.y + (p2.y - p1.y) * t
  );
}

function pushAlong(from, to, point, distance) {
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  const len = Math.hypot(dx, dy) || 1;
  return new go.Point(
    point.x + (dx / len) * distance,
    point.y + (dy / len) * distance
  );
}

/* ================= 重绘梯子 ================= */
function redrawLadder() {
  const A = diagram.findNodeForKey("A");
  const B = diagram.findNodeForKey("B");
  const C = diagram.findNodeForKey("C");
  if (!A || !B || !C) return;

  const AB_from = A.getDocumentPoint(go.Spot.Bottom);
  const AB_to   = B.getDocumentPoint(go.Spot.Top);

  const AC_from = A.getDocumentPoint(go.Spot.Bottom);
  const AC_to   = C.getDocumentPoint(go.Spot.Top);

  const geo = new go.Geometry();

  LADDER_T_VALUES.forEach(t => {
    let left  = lerp(AB_from, AB_to, t);
    let right = lerp(AC_from, AC_to, t);

    // ⭐ 关键优化：端点贴边
    left  = pushAlong(AB_from, AB_to, left,  TOUCH_OFFSET);
    right = pushAlong(AC_from, AC_to, right, -TOUCH_OFFSET);

    const fig = new go.PathFigure(left.x, left.y, false);
    fig.add(new go.PathSegment(go.PathSegment.Line, right.x, right.y));
    geo.add(fig);
  });

  ladderPart.findObject("LADDER").geometry = geo;
}

/* ================= 实时监听 ================= */
diagram.addModelChangedListener(e => {
  if (e.propertyName === "loc") redrawLadder();
});
diagram.addDiagramListener("InitialLayoutCompleted", redrawLadder);

</script>
</body>
</html>
