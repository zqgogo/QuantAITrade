<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>三节点供电 + 横向梯子线（最终稳定版）</title>

  <!-- 按你的要求，不改 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gojs@3.0.24/release/go.js"></script>

  <style>
    html, body, #diagramDiv {
      width: 100%;
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="diagramDiv"></div>

<script>
const $ = go.GraphObject.make;

/* ================= Diagram ================= */
const diagram = $(go.Diagram, "diagramDiv", {
  "undoManager.isEnabled": true
});

/* ================= Node（改回普通样式） ================= */
diagram.nodeTemplate =
  $(go.Node, "Auto",
    { locationSpot: go.Spot.Center },
    new go.Binding("location", "loc", go.Point.parse)
      .makeTwoWay(go.Point.stringify),

    $(go.Shape, "RoundedRectangle", {
      fill: "#ffffff",
      stroke: "#333",
      strokeWidth: 2
    }),

    $(go.TextBlock, {
      margin: 10,
      font: "14px sans-serif"
    }, new go.Binding("text", "key"))
  );

/* ================= 单线 Link ================= */
diagram.linkTemplate =
  $(go.Link,
    { selectable: false },
    $(go.Shape, {
      stroke: "#333",
      strokeWidth: 2
    })
  );

/* ================= Model（A 在上） ================= */
diagram.model = new go.GraphLinksModel(
  [
    { key: "A", loc: "300 80"  },
    { key: "B", loc: "120 300" },
    { key: "C", loc: "480 300" }
  ],
  [
    { from: "A", to: "B" },
    { from: "A", to: "C" }
  ]
);

/* ================= 梯子横线 Part ================= */
const ladderPart =
  $(go.Part,
    {
      selectable: false,
      layerName: "Foreground"
    },
    $(go.Shape, {
      name: "LADDER",
      stroke: "red",
      strokeWidth: 3
    })
  );

diagram.add(ladderPart);

/* ================= 工具：线性插值 ================= */
function lerp(p1, p2, t) {
  return new go.Point(
    p1.x + (p2.x - p1.x) * t,
    p1.y + (p2.y - p1.y) * t
  );
}

/* ================= 重绘梯子线 ================= */
function redrawLadder() {
  const A = diagram.findNodeForKey("A");
  const B = diagram.findNodeForKey("B");
  const C = diagram.findNodeForKey("C");
  if (!A || !B || !C) return;

  // A -> B 单线端点
  const AB_from = A.getDocumentPoint(go.Spot.Bottom);
  const AB_to   = B.getDocumentPoint(go.Spot.Top);

  // A -> C 单线端点
  const AC_from = A.getDocumentPoint(go.Spot.Bottom);
  const AC_to   = C.getDocumentPoint(go.Spot.Top);

  // 在两条单线的同一比例位置取点
  // 这个比例决定梯子“离 A 多近”
  const t = 0.45;

  const pLeft  = lerp(AB_from, AB_to, t);
  const pRight = lerp(AC_from, AC_to, t);

  const shape = ladderPart.findObject("LADDER");

  const geo = new go.Geometry();
  const fig = new go.PathFigure(pLeft.x, pLeft.y, false);
  fig.add(new go.PathSegment(go.PathSegment.Line, pRight.x, pRight.y));
  geo.add(fig);

  shape.geometry = geo;
}

/* ================= 监听 ================= */
diagram.addDiagramListener("InitialLayoutCompleted", redrawLadder);
diagram.addDiagramListener("SelectionMoved", redrawLadder);
diagram.addDiagramListener("ViewportBoundsChanged", redrawLadder);

</script>
</body>
</html>
