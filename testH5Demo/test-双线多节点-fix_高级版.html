<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/gojs@3.0.24/release/go.js"></script>
<style>
html,body,#diagramDiv { width:100%; height:100%; margin:0; }
</style>
</head>
<body>
<div id="diagramDiv"></div>

<script>
const $ = go.GraphObject.make;

/* ================= 1. 统一参数配置中心 ================= */
const CONFIG = {
  gap: 20,              // 两根平行线之间的间距
  /**
   * 平行双轨两侧默认样式（index 0 / 1 对应 P0 / P1）。
   * 单条边可覆盖：railStroke0/1、railStrokes:[c0,c1]、railSide0/1（部分字段合并，如 { strokeWidth: 3 }）
   */
  parallelRail: {
    side0: { stroke: "#333", strokeWidth: 2 },
    side1: { stroke: "#333", strokeWidth: 2 }
  },
  edgeLadder: {         // 红色跨边梯线（红线）的默认参数
    startOffset: 50,    // 距离共享节点的起始距离
    ladderSpacing: 20,  // 红线组内部的线条间距
    ladderCount: 2      // 绘制多少根红杠
  },
  internalLadder: {     // 平行线内部梯级（黑色短杠）的默认参数
    /** fromEnds：从两端相向画，需 ladderCount；fullSpan：多条单侧 d 的 rung 铺满；拖动中随弦长动态增减条数 */
    mode: "fullSpan",   // "fromEnds" | "fullSpan"
    startOffset: 15,    // 距两端留白（fullSpan：首尾各留 startOffset）
    ladderSpacing: 12,  // 横杠间距（fromEnds：每侧相邻横杠距；fullSpan：相邻横杠沿轨距）
    ladderCount: 4      // 仅 fromEnds：每一端绘制多少根黑杠
  }
};

function ensureParallelKeyAliasMap(diagram) {
  if (!diagram._parallelKeyAlias) diagram._parallelKeyAlias = new Map();
  return diagram._parallelKeyAlias;
}

/** chain 合并后第二条边（如 L5）不再存在，解析到主 key（如 L1）再取 L1_P0 */
function registerChainKeyAliases(diagram, canonicalKey, otherKey) {
  const map = ensureParallelKeyAliasMap(diagram);
  map.set(canonicalKey, canonicalKey);
  if (otherKey && otherKey !== canonicalKey) map.set(otherKey, canonicalKey);
}

/**
 * 两条 chain 是否描述同一对节点：支持 A>B+B>A，也支持 两条 A>B（后端两条同向边）。
 * 合并后几何按 canonicalKey 那条的 from→to 作为平行轨方向。
 */
function sameChainEndpoints(d1, d2) {
  if (!d1 || !d2) return false;
  const a1 = d1.from, b1 = d1.to;
  const a2 = d2.from, b2 = d2.to;
  return (a1 === a2 && b1 === b2) || (a1 === b2 && b1 === a2);
}

/** 合并 CONFIG.parallelRail.side0/1 与单条边上的覆盖，得到两侧 { stroke, strokeWidth } */
function resolveParallelRailSides(opts) {
  const pr = CONFIG.parallelRail;
  const base0 = { stroke: "#333", strokeWidth: 2, ...(pr.side0 || {}) };
  const base1 = { stroke: "#333", strokeWidth: 2, ...(pr.side1 || {}) };
  if (opts.railStroke0 != null && opts.railStroke0 !== "") base0.stroke = opts.railStroke0;
  if (opts.railStroke1 != null && opts.railStroke1 !== "") base1.stroke = opts.railStroke1;
  if (Array.isArray(opts.railStrokes)) {
    if (opts.railStrokes[0] != null && opts.railStrokes[0] !== "") base0.stroke = opts.railStrokes[0];
    if (opts.railStrokes[1] != null && opts.railStrokes[1] !== "") base1.stroke = opts.railStrokes[1];
  }
  if (opts.railSide0 && typeof opts.railSide0 === "object") Object.assign(base0, opts.railSide0);
  if (opts.railSide1 && typeof opts.railSide1 === "object") Object.assign(base1, opts.railSide1);
  return [base0, base1];
}

/**
 * chain 单边对应一条物理轨：只解析「这一条」link 的样式（与 parallel 单边写 railStroke0/1 两轨不同）。
 * 优先 railTrack；否则 railStroke + railStrokeWidth；否则退回该边 railOpts 里「第一侧」合并结果（railStroke0 / railStrokes[0] 等）。
 */
function resolveChainLinkTrackStyle(d) {
  const pr = CONFIG.parallelRail;
  const fallbackStroke = (pr.side0 && pr.side0.stroke) || "#333";
  const fallbackW = (pr.side0 && pr.side0.strokeWidth != null) ? pr.side0.strokeWidth : 2;
  if (!d) return { stroke: fallbackStroke, strokeWidth: fallbackW };
  if (d.railTrack && typeof d.railTrack === "object") {
    const t = d.railTrack;
    return {
      stroke: t.stroke != null && t.stroke !== "" ? t.stroke : fallbackStroke,
      strokeWidth: t.strokeWidth != null ? t.strokeWidth : fallbackW
    };
  }
  if (d.railStroke != null && d.railStroke !== "") {
    return {
      stroke: d.railStroke,
      strokeWidth: d.railStrokeWidth != null ? d.railStrokeWidth : fallbackW
    };
  }
  const [one] = resolveParallelRailSides(railOptsFromLinkData(d));
  return { stroke: one.stroke, strokeWidth: one.strokeWidth };
}

/** 逻辑 key → 实际平行轨 link（*_P0）；chain 别名优先，否则有 *_P0 则用逻辑 key 本身 */
function resolveParallelLinkKey(diagram, logicalKey) {
  if (!logicalKey) return logicalKey;
  const m = diagram.model;
  const map = diagram._parallelKeyAlias;
  const canonical = map && map.has(logicalKey) ? map.get(logicalKey) : logicalKey;
  if (m.findLinkDataForKey(canonical + "_P0")) return canonical + "_P0";
  if (canonical !== logicalKey && m.findLinkDataForKey(logicalKey + "_P0"))
    return logicalKey + "_P0";
  return logicalKey;
}

/* ================= 2. NormalLink：category 默认 / 无 category — 单线 ================= */
class NormalLink extends go.Link {
  constructor() { super(); }

  computePoints() {
    const A = this.fromNode, B = this.toNode;
    if (!A || !B) return false;
    const pA = this.getLinkPoint(A, this.fromPort, this.computeSpot(true), true, false, B, this.toPort);
    const pB = this.getLinkPoint(B, this.toPort, this.computeSpot(false), false, false, A, this.fromPort);
    this.clearPoints();
    this.addPoint(pA);
    this.addPoint(pB);
    return true;
  }
}

/**
 * ParallelChainLink：仅绘制平行链条中的两条轨（category 为 "parallel" 或 "chain"）。
 * 数据字段：index 0 | 1，gap；合并前仅 category:chain 且无 index 时暂画中轴。
 */
class ParallelChainLink extends go.Link {
  constructor() { super(); }

  computePoints() {
    const A = this.fromNode, B = this.toNode;
    if (!A || !B) return false;
    const pA = this.getLinkPoint(A, this.fromPort, this.computeSpot(true), true, false, B, this.toPort);
    const pB = this.getLinkPoint(B, this.toPort, this.computeSpot(false), false, false, A, this.fromPort);
    const dx = pB.x - pA.x, dy = pB.y - pA.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const halfGap = (this.data.gap ?? CONFIG.gap) / 2;
    const idx = this.data.index;

    this.clearPoints();
    if (idx !== 0 && idx !== 1) {
      this.addPoint(pA);
      this.addPoint(pB);
      return true;
    }
    const offset = idx === 0 ? -halfGap : halfGap;
    this.addPoint(new go.Point(pA.x + nx * offset, pA.y + ny * offset));
    this.addPoint(new go.Point(pB.x + nx * offset, pB.y + ny * offset));
    return true;
  }
}

/**
 * ChainRungLink：平行轨之间的黑色短横杠（category 固定为 "rung"）。
 * fullSpan 在模型里拆成多条本类 link（每条带 d，仅从 from 端沿弦距离），与 fromEnds 单侧同源，无自定义 makeGeometry，避免整段闪烁。
 * 数据字段：d，reverse?，gap；可选 fullSpanFor 标记归属哪条平行边（仅模型用）。
 */
class ChainRungLink extends go.Link {
  constructor() { super(); }

  computePoints() {
    const A = this.fromNode, B = this.toNode;
    if (!A || !B) return false;
    const pA = this.getLinkPoint(A, this.fromPort, this.computeSpot(true), true, false, B, this.toPort);
    const pB = this.getLinkPoint(B, this.toPort, this.computeSpot(false), false, false, A, this.fromPort);
    const dx = pB.x - pA.x, dy = pB.y - pA.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const halfGap = (this.data.gap ?? CONFIG.gap) / 2;
    const d = this.data.d ?? 20;
    const t = (this.data.reverse ? (len - d) : d) / len;
    const cx = pA.x + dx * t, cy = pA.y + dy * t;
    this.clearPoints();
    this.addPoint(new go.Point(cx - halfGap * nx, cy - halfGap * ny));
    this.addPoint(new go.Point(cx + halfGap * nx, cy + halfGap * ny));
    return true;
  }
}

/* ================= 3. LadderLink：category "ladder" — 三角夹角红色跨边横栏 ================= */
class LadderLink extends go.Link {
  constructor() { 
    super(); 
    this.layerName = "Foreground"; // 置于顶层
    this.selectable = false;       // 不可选中
  }

  // 占位函数：不绘制 Link 默认路径
  computePoints() { this.clearPoints(); this.addPoint(new go.Point(0,0)); this.addPoint(new go.Point(0,0)); return true; }

  // 自定义绘制多根梯线
  makeGeometry() {
    const geo = new go.Geometry();
    const lk = (k) => resolveParallelLinkKey(this.diagram, k);
    const left = this.diagram.findLinkForKey(lk(this.data.leftLinkKey));
    const right = this.diagram.findLinkForKey(lk(this.data.rightLinkKey));
    if (!left || !right) return geo;

    // 寻找这两条线的公共交点
    const shared = (left.fromNode===right.fromNode || left.fromNode===right.toNode) ? left.fromNode : left.toNode;
    const count = this.data.ladderCount ?? CONFIG.edgeLadder.ladderCount;
    const base = this.data.startOffset ?? CONFIG.edgeLadder.startOffset;
    const spacing = this.data.ladderSpacing ?? CONFIG.edgeLadder.ladderSpacing;

    for (let i=0; i<count; i++) {
      const dist = base + i * spacing;
      // 关键：getSmartPoint 会自动吸附物理距离最近的平行线边缘
      const p1 = this.getSmartPoint(left, right, shared, dist);
      const p2 = this.getSmartPoint(right, left, shared, dist);
      const fig = new go.PathFigure(p1.x, p1.y, false);
      fig.add(new go.PathSegment(go.PathSegment.Line, p2.x, p2.y));
      geo.add(fig);
    }
    return geo;
  }

  // 核心逻辑：自动判断并偏移坐标
  getSmartPoint(link, otherLink, shared, dist) {
    const otherNode = (link.fromNode === shared) ? link.toNode : link.fromNode;
    const dx = otherNode.location.x - shared.location.x, dy = otherNode.location.y - shared.location.y;
    const len = Math.hypot(dx, dy) || 1;
    const dir = new go.Point(dx/len, dy/len); // 本条线的方向
    let pt = new go.Point(shared.location.x + dir.x * dist, shared.location.y + dir.y * dist);

    // 平行轨（由 ParallelChainLink 绘制，数据带 index 0/1）
    if (link.data.index === 0 || link.data.index === 1) {
      const nx = -dir.y, ny = dir.x; // 获取法线
      const halfGap = (link.data.gap ?? CONFIG.gap) / 2;
      // 获取另一条线的方向，通过点积判断夹角
      const oOtherNode = (otherLink.fromNode === shared) ? otherLink.toNode : otherLink.fromNode;
      const oDx = oOtherNode.location.x - shared.location.x, oDy = oOtherNode.location.y - shared.location.y;
      const oLen = Math.hypot(oDx, oDy) || 1;
      // 如果法线与另一条线的夹角是钝角，则取负偏移，使其靠近对方
      const offset = (nx * (oDx/oLen) + ny * (oDy/oLen) > 0) ? halfGap : -halfGap;
      pt.offset(nx * offset, ny * offset);
    }
    return pt;
  }
}

/* ================= 4. 封装：按 category 写入「平行轨」与「轨内横杠」两类 linkData ================= */

/** 用节点 loc 估弦长（轨尚未路由时） */
function chordLenFromNodeLocs(m, fromK, toK) {
  const findNd = typeof m.findNodeDataForKey === "function"
    ? (k) => m.findNodeDataForKey(k)
    : (k) => m.nodeDataArray.find(n => n && n.key === k);
  const da = findNd(fromK), db = findNd(toK);
  if (da && db && da.loc != null && db.loc != null) {
    const pa = go.Point.parse(String(da.loc)), pb = go.Point.parse(String(db.loc));
    return Math.hypot(pb.x - pa.x, pb.y - pa.y) || 1;
  }
  return 1;
}

/**
 * 与 ChainRungLink / ParallelChainLink 一致：用两端 getLinkPoint 算弦长。
 * 勿用轨道路径点或节点中心 loc——中心距会偏大，fullSpan 会多算横杠而「顶穿」对端 startOffset。
 */
function estimateChordLengthForParallelEdge(diag, linkKey, fromK, toK) {
  const rail = diag.findLinkForKey(linkKey + "_P0");
  if (rail && rail.fromNode && rail.toNode) {
    const A = rail.fromNode, B = rail.toNode;
    const pA = rail.getLinkPoint(A, rail.fromPort, rail.computeSpot(true), true, false, B, rail.toPort);
    const pB = rail.getLinkPoint(B, rail.toPort, rail.computeSpot(false), false, false, A, rail.fromPort);
    return Math.hypot(pB.x - pA.x, pB.y - pA.y) || 1;
  }
  return chordLenFromNodeLocs(diag.model, fromK, toK);
}

/** fullSpan：按当前弦长删掉旧横杠 link，再只从 from 端用 spacing 铺满（多条独立 rung，行为同单侧 fromEnds） */
function rebuildFullSpanRungsInModel(diag, linkKey) {
  const m = diag.model;
  const d0 = m.findLinkDataForKey(linkKey + "_P0");
  if (!d0 || d0.parallelEdgeMode !== "fullSpan") return;
  const from = d0.from, to = d0.to, gap = d0.gap ?? CONFIG.gap;
  const startOffset = d0.spanStartOffset ?? CONFIG.internalLadder.startOffset;
  const spacing = Math.max(d0.spanSpacing ?? CONFIG.internalLadder.ladderSpacing, 1e-6);
  const toRemove = m.linkDataArray.filter(x => x && x.fullSpanFor === linkKey);
  for (const x of toRemove) m.removeLinkData(x);
  const len = estimateChordLengthForParallelEdge(diag, linkKey, from, to);
  const maxD = len - startOffset;
  const minRoom = 1e-3;
  if (maxD < startOffset - minRoom) return;
  const endMarginPx = 0.35;
  let k = 0;
  for (;;) {
    const d = startOffset + k * spacing;
    if (d > maxD - endMarginPx) break;
    m.addLinkData({
      key: linkKey + "_s" + k,
      from, to, d, gap, category: "rung",
      fullSpanFor: linkKey
    });
    k++;
  }
}

function rebuildAllFullSpanRungs(diag) {
  const seen = new Set();
  for (const d of diag.model.linkDataArray) {
    if (!d || d.key == null) continue;
    const ks = String(d.key);
    if (!ks.endsWith("_P0") || d.parallelEdgeMode !== "fullSpan") continue;
    const base = ks.slice(0, -3);
    if (seen.has(base)) continue;
    seen.add(base);
    rebuildFullSpanRungsInModel(diag, base);
  }
}

/** 拖动中：仅重算「端点在被拖节点集合里」的 fullSpan 横杠条数（无拖动节点则跳过，避免误全量重建） */
function rebuildFullSpanRungsTouchingDraggedNodes(diag, dragged) {
  if (!dragged || dragged.size === 0) return;
  const run = () => {
    const seen = new Set();
    for (const d of diag.model.linkDataArray) {
      if (!d || d.key == null) continue;
      const ks = String(d.key);
      if (!ks.endsWith("_P0") || d.parallelEdgeMode !== "fullSpan") continue;
      const fN = diag.findNodeForKey(d.from), tN = diag.findNodeForKey(d.to);
      if (!fN || !tN) continue;
      if (!dragged.has(fN) && !dragged.has(tN)) continue;
      const base = ks.slice(0, -3);
      if (seen.has(base)) continue;
      seen.add(base);
      rebuildFullSpanRungsInModel(diag, base);
    }
  };
  if (diag.skipsUndoManager) {
    run();
    return;
  }
  diag.skipsUndoManager = true;
  try {
    run();
  } finally {
    diag.skipsUndoManager = false;
  }
}

function addParallelRailsForEdge(m, linkKey, from, to, customOpts = {}, diag = null) {
  const mode = customOpts.internalLadderMode ?? CONFIG.internalLadder.mode ?? "fromEnds";
  const startOffset = customOpts.startOffset ?? CONFIG.internalLadder.startOffset;
  const ladderSpacing = customOpts.ladderSpacing ?? CONFIG.internalLadder.ladderSpacing;
  const ladderCount = customOpts.ladderCount ?? CONFIG.internalLadder.ladderCount;
  const gap = customOpts.gap ?? CONFIG.gap;
  const railCategory = customOpts.railCategory ?? "parallel";
  const rungCategory = customOpts.rungCategory ?? "rung";
  let side0, side1;
  if (Array.isArray(customOpts._chainPerLinkTracks) && customOpts._chainPerLinkTracks.length === 2) {
    side0 = customOpts._chainPerLinkTracks[0];
    side1 = customOpts._chainPerLinkTracks[1];
  } else {
    [side0, side1] = resolveParallelRailSides(customOpts);
  }
  if (mode === "fullSpan") {
    m.addLinkData({
      key: linkKey + "_P0", from, to, index: 0, gap, category: railCategory,
      railStroke: side0.stroke, railStrokeWidth: side0.strokeWidth,
      parallelEdgeMode: "fullSpan",
      spanStartOffset: startOffset,
      spanSpacing: ladderSpacing
    });
    m.addLinkData({
      key: linkKey + "_P1", from, to, index: 1, gap, category: railCategory,
      railStroke: side1.stroke, railStrokeWidth: side1.strokeWidth,
      parallelEdgeMode: "fullSpan"
    });
    if (diag) rebuildFullSpanRungsInModel(diag, linkKey);
  } else {
    m.addLinkData({
      key: linkKey + "_P0", from, to, index: 0, gap, category: railCategory,
      railStroke: side0.stroke, railStrokeWidth: side0.strokeWidth
    });
    m.addLinkData({
      key: linkKey + "_P1", from, to, index: 1, gap, category: railCategory,
      railStroke: side1.stroke, railStrokeWidth: side1.strokeWidth
    });
    for (let j = 0; j < ladderCount; j++) {
      const d = startOffset + j * ladderSpacing;
      m.addLinkData({ from, to, d, gap, category: rungCategory });
      m.addLinkData({ from, to, d, reverse: true, gap, category: rungCategory });
    }
  }
}

/**
 * convertLinkToParallel: 将 Model 中的普通 Link 自动转换为双平行轨道结构
 * 会自动处理：1.删除原中线 2.生成两侧物理轨道 3.生成内部梯级
 */
function convertLinkToParallel(linkKey, customOpts, diag) {
  const m = diag.model;
  const oldData = m.findLinkDataForKey(linkKey);
  if (!oldData) return;
  const from = oldData.from, to = oldData.to;
  m.removeLinkData(oldData);
  addParallelRailsForEdge(m, linkKey, from, to, customOpts, diag);
}

/**
 * chain：移除两条中线（一正一反或两条同向），只保留一对平行轨。
 * 轨 key 为 canonicalKey（如 L1_P0/L1_P1）；otherKey（如 L5）注册别名以便红线仍可写 leftLinkKey: "L5"。
 */
function convertChainToParallel(canonicalKey, otherKey, customOpts, diag) {
  const m = diag.model;
  const dF = m.findLinkDataForKey(canonicalKey);
  const dR = m.findLinkDataForKey(otherKey);
  if (!dF || !dR || !sameChainEndpoints(dF, dR)) return;
  const from = dF.from, to = dF.to;
  m.removeLinkData(dF);
  m.removeLinkData(dR);
  registerChainKeyAliases(diag, canonicalKey, otherKey);
  addParallelRailsForEdge(m, canonicalKey, from, to, { ...customOpts, railCategory: "chain" }, diag);
}

/** 无向边签名，用于把两条 category:chain 归到同一对端点上 */
function undirectedEdgeSig(from, to) {
  const a = String(from), b = String(to);
  return a <= b ? a + "\0" + b : b + "\0" + a;
}

/** 从 linkData 上读取扩轨 / 梯级参数（ladderCount、gap、internalLadderMode 等） */
function railOptsFromLinkData(d) {
  if (!d) return {};
  const o = {};
  if (d.ladderCount != null) o.ladderCount = d.ladderCount;
  if (d.gap != null) o.gap = d.gap;
  if (d.startOffset != null) o.startOffset = d.startOffset;
  if (d.ladderSpacing != null) o.ladderSpacing = d.ladderSpacing;
  if (d.internalLadderMode != null) o.internalLadderMode = d.internalLadderMode;
  if (d.rungCategory != null) o.rungCategory = d.rungCategory;
  if (d.railStroke0 != null) o.railStroke0 = d.railStroke0;
  if (d.railStroke1 != null) o.railStroke1 = d.railStroke1;
  if (Array.isArray(d.railStrokes)) o.railStrokes = d.railStrokes;
  if (d.railSide0 && typeof d.railSide0 === "object") o.railSide0 = { ...d.railSide0 };
  if (d.railSide1 && typeof d.railSide1 === "object") o.railSide1 = { ...d.railSide1 };
  if (d.parallelEdgeMode != null) o.parallelEdgeMode = d.parallelEdgeMode;
  if (d.spanStartOffset != null) o.spanStartOffset = d.spanStartOffset;
  if (d.spanSpacing != null) o.spanSpacing = d.spanSpacing;
  return o;
}

/**
 * 按模型声明应用几何：category "chain" 且同端点对的两条边自动合并为平行链条；
 * category "parallel" 的单边自动扩为双轨（可选 ladderCount、gap 等写在对应 linkData 上）。
 *
 * chain：两条边按 key 字典序排序后，第一条（如 L1）只决定 P0 轨颜色，第二条（如 L5）只决定 P1 轨颜色。
 * 每条边单独写 railTrack / railStroke（见 resolveChainLinkTrackStyle）；parallel 单边仍可用 railStroke0/1、railStrokes。
 */
function applyDeclaredLinkGeometry(diag) {
  const m = diag.model;
  diag._parallelKeyAlias = new Map();

  const chainLinks = m.linkDataArray.filter(d =>
    d && d.category === "chain" && d.key != null && d.from != null && d.to != null
  );
  const byEdge = new Map();
  for (const d of chainLinks) {
    const sig = undirectedEdgeSig(d.from, d.to);
    if (!byEdge.has(sig)) byEdge.set(sig, []);
    byEdge.get(sig).push(d);
  }
  for (const group of byEdge.values()) {
    if (group.length < 2) continue;
    group.sort((a, b) => String(a.key).localeCompare(String(b.key)));
    const opts = { ...railOptsFromLinkData(group[0]), ...railOptsFromLinkData(group[1]) };
    opts._chainPerLinkTracks = [
      resolveChainLinkTrackStyle(group[0]),
      resolveChainLinkTrackStyle(group[1])
    ];
    convertChainToParallel(group[0].key, group[1].key, opts, diag);
  }

  const parallelLinks = m.linkDataArray.filter(d =>
    d && d.category === "parallel" && d.key != null && d.from != null && d.to != null &&
    !String(d.key).endsWith("_P0") && !String(d.key).endsWith("_P1") &&
    !/_s\d+$/.test(String(d.key))
  );
  for (const d of parallelLinks) {
    convertLinkToParallel(d.key, railOptsFromLinkData(d), diag);
  }

  diag.links.each(l => l.invalidateRoute());
  rebuildAllFullSpanRungs(diag);
  diag.links.each(l => l.invalidateRoute());
}

/**
 * linkTemplateMap.category 约定（与 model 中 linkData.category 一致）：
 *   ""        → NormalLink
 *   "parallel"→ ParallelChainLink（单边扩成双线时的轨）
 *   "chain"   → ParallelChainLink（A↔B 合并链条的轨）
 *   "rung"    → ChainRungLink（轨内黑色短杠）
 *   "ladder"  → LadderLink（三角夹角红杠）
 */
/* ================= 5. Diagram 初始化与运行 ================= */
const diagram = $(go.Diagram, "diagramDiv", { "undoManager.isEnabled": true });
diagram.linkCategoryProperty = "category";

/**
 * 当前拖拽中的节点：优先 draggedParts；为空时用 selection（GoJS 部分版本拖动时 draggedParts 晚一拍为空，
 * 会导致 fullSpan 在拖动中不重算）。
 */
function draggedNodeSetFromTool(tool, diag) {
  const s = new Set();
  if (tool && tool.draggedParts) {
    tool.draggedParts.each(p => {
      if (p instanceof go.Node) s.add(p);
    });
  }
  if (s.size === 0 && tool && tool.isActive && diag && diag.selection) {
    diag.selection.each(p => {
      if (p instanceof go.Node) s.add(p);
    });
  }
  return s;
}

function linkTouchesDraggedNodes(link, dragged) {
  if (!dragged || dragged.size === 0) return true;
  const f = link.fromNode, t = link.toNode;
  return !!(f && dragged.has(f)) || !!(t && dragged.has(t));
}

function ladderTouchesDraggedNodes(ladderLink, diag, dragged) {
  if (!dragged || dragged.size === 0) return true;
  const lk = (k) => resolveParallelLinkKey(diag, k);
  const left = diag.findLinkForKey(lk(ladderLink.data.leftLinkKey));
  const right = diag.findLinkForKey(lk(ladderLink.data.rightLinkKey));
  for (const edge of [left, right]) {
    if (!edge) continue;
    const f = edge.fromNode, t = edge.toNode;
    if ((f && dragged.has(f)) || (t && dragged.has(t))) return true;
  }
  return false;
}

function invalidateDynamicLinksForDrag(diag, tool) {
  if (!tool || !tool.isActive) return;
  const dragged = draggedNodeSetFromTool(tool, diag);
  if (dragged.size === 0) {
    invalidateAllDynamicLinks(diag);
    return;
  }
  diag.links.each(l => {
    if (l instanceof ParallelChainLink || l instanceof ChainRungLink) {
      if (linkTouchesDraggedNodes(l, dragged)) l.invalidateRoute();
    } else if (l instanceof LadderLink) {
      if (ladderTouchesDraggedNodes(l, diag, dragged)) l.invalidateRoute();
    }
  });
}

function invalidateAllDynamicLinks(diag) {
  diag.links.each(l => {
    if (l instanceof LadderLink || l instanceof ParallelChainLink || l instanceof ChainRungLink) l.invalidateRoute();
  });
}

// 拖拽移动：只失效与拖动节点相关的线；抬起/取消：全量刷一次保证一致
(function installDragInvalidateRaf() {
  const drag = diagram.toolManager.draggingTool;
  let rafId = null;
  function flushInvalidate() {
    if (rafId != null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
    invalidateAllDynamicLinks(diagram);
  }
  const baseMove = drag.doMouseMove.bind(drag);
  drag.doMouseMove = function() {
    baseMove();
    const dragged = draggedNodeSetFromTool(drag, diagram);
    rebuildFullSpanRungsTouchingDraggedNodes(diagram, dragged);
    if (rafId == null) {
      rafId = requestAnimationFrame(() => {
        rafId = null;
        invalidateDynamicLinksForDrag(diagram, drag);
      });
    }
  };
  const baseUp = drag.doMouseUp.bind(drag);
  drag.doMouseUp = function() {
    baseUp();
    flushInvalidate();
  };
  const baseCancel = drag.doCancel.bind(drag);
  drag.doCancel = function() {
    baseCancel();
    flushInvalidate();
  };
})();

// Node 模板
diagram.nodeTemplate = $(go.Node, "Auto", { locationSpot: go.Spot.Center },
  new go.Binding("location", "loc", go.Point.parse).makeTwoWay(go.Point.stringify),
  $(go.Shape, "RoundedRectangle", { fill: "#fff", stroke: "#333", strokeWidth: 2 }),
  $(go.TextBlock, { margin: 10 }, new go.Binding("text", "key"))
);

const linkBinding = { selectable: false };
const edgeShape = { stroke: "#333", strokeWidth: 2 };
const normalLinkTpl = $(NormalLink, linkBinding, $(go.Shape, edgeShape));
const parallelChainLinkTpl = $(ParallelChainLink, linkBinding,
  $(go.Shape,
    { stroke: CONFIG.parallelRail.side0.stroke, strokeWidth: CONFIG.parallelRail.side0.strokeWidth },
    new go.Binding("stroke", "railStroke", (v, sh) => {
      if (v != null && v !== "") return v;
      const d = sh.part && sh.part.data;
      const side = d && d.index === 1 ? CONFIG.parallelRail.side1 : CONFIG.parallelRail.side0;
      return (side && side.stroke) || "#333";
    }),
    new go.Binding("strokeWidth", "railStrokeWidth", (v, sh) => {
      if (v != null && v !== "") return v;
      const d = sh.part && sh.part.data;
      const side = d && d.index === 1 ? CONFIG.parallelRail.side1 : CONFIG.parallelRail.side0;
      return (side && side.strokeWidth != null) ? side.strokeWidth : 2;
    })));
const chainRungLinkTpl = $(ChainRungLink, linkBinding, $(go.Shape, edgeShape));

diagram.linkTemplateMap.add("", normalLinkTpl);
diagram.linkTemplateMap.add("parallel", parallelChainLinkTpl);
diagram.linkTemplateMap.add("chain", parallelChainLinkTpl);
diagram.linkTemplateMap.add("rung", chainRungLinkTpl);
diagram.linkTemplateMap.add("ladder", $(LadderLink, $(go.Shape, { stroke: "red", strokeWidth: 3 })));
diagram.linkTemplate = normalLinkTpl;

/* ================= 6. 数据源 ================= */
diagram.model = new go.GraphLinksModel(
  [{ key: "A", loc: "300 80" }, { key: "B", loc: "120 300" }, { key: "C", loc: "300 300" }, { key: "D", loc: "480 300" }],
  [
    { key: "L1", from: "A", to: "B", category: "chain", railTrack: { stroke: "#0d47a1", strokeWidth: 2 } },
    { key: "L5", from: "B", to: "A", category: "chain", railTrack: { stroke: "#e65100", strokeWidth: 3 } },
    { key: "L2", from: "A", to: "C", category: "parallel", internalLadderMode: "fullSpan", startOffset: 12, ladderSpacing: 14, railStrokes: ["#1565c0", "#ef6c00"] },
    { key: "L3", from: "A", to: "D", category: "parallel", ladderCount: 2, gap: 30 },
    { key: "L4", from: "B", to: "C" },
    { category: "ladder", leftLinkKey: "L1", rightLinkKey: "L2" },
    { category: "ladder", leftLinkKey: "L2", rightLinkKey: "L3" }
  ]
);
diagram.model.linkKeyProperty = "key";

// 初始布局后：仅根据 linkData.category / 端点对 做 chain 合并与 parallel 扩轨（见 applyDeclaredLinkGeometry）
diagram.addDiagramListener("InitialLayoutCompleted", () => {
  applyDeclaredLinkGeometry(diagram);
});

// 拖动结束再全量同步一次（程序改位置、非 DraggingTool 等情况）；平常拖动中已在 rAF 里动态重算条数
diagram.addDiagramListener("SelectionMoved", () => {
  if (diagram.skipsUndoManager) return;
  diagram.skipsUndoManager = true;
  try {
    rebuildAllFullSpanRungs(diagram);
  } finally {
    diagram.skipsUndoManager = false;
  }
  invalidateAllDynamicLinks(diagram);
});
</script>
</body>
</html>
