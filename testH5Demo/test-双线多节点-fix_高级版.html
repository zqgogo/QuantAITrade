<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/gojs@3.0.24/release/go.js"></script>
<style>
html,body,#diagramDiv { width:100%; height:100%; margin:0; }
</style>
</head>
<body>
<div id="diagramDiv"></div>

<script>
const $ = go.GraphObject.make;

/* ================= 1. 统一参数配置中心 ================= */
const CONFIG = {
  gap: 20,              // 两根平行线之间的间距
  edgeLadder: {         // 红色跨边梯线（红线）的默认参数
    startOffset: 50,    // 距离共享节点的起始距离
    ladderSpacing: 20,  // 红线组内部的线条间距
    ladderCount: 2      // 绘制多少根红杠
  },
  internalLadder: {     // 平行线内部梯级（黑色短杠）的默认参数
    startOffset: 15,    // 距离端点的偏移量
    ladderSpacing: 12,  // 线条之间的间距
    ladderCount: 4      // 每一端绘制多少根黑杠
  }
};

function ensureParallelKeyAliasMap(diagram) {
  if (!diagram._parallelKeyAlias) diagram._parallelKeyAlias = new Map();
  return diagram._parallelKeyAlias;
}

/** chain 合并后第二条边（如 L5）不再存在，解析到主 key（如 L1）再取 L1_P0 */
function registerChainKeyAliases(diagram, canonicalKey, otherKey) {
  const map = ensureParallelKeyAliasMap(diagram);
  map.set(canonicalKey, canonicalKey);
  if (otherKey && otherKey !== canonicalKey) map.set(otherKey, canonicalKey);
}

/**
 * 两条 chain 是否描述同一对节点：支持 A>B+B>A，也支持 两条 A>B（后端两条同向边）。
 * 合并后几何按 canonicalKey 那条的 from→to 作为平行轨方向。
 */
function sameChainEndpoints(d1, d2) {
  if (!d1 || !d2) return false;
  const a1 = d1.from, b1 = d1.to;
  const a2 = d2.from, b2 = d2.to;
  return (a1 === a2 && b1 === b2) || (a1 === b2 && b1 === a2);
}

/** 逻辑 key → 实际平行轨 link（*_P0）；chain 别名优先，否则有 *_P0 则用逻辑 key 本身 */
function resolveParallelLinkKey(diagram, logicalKey) {
  if (!logicalKey) return logicalKey;
  const m = diagram.model;
  const map = diagram._parallelKeyAlias;
  const canonical = map && map.has(logicalKey) ? map.get(logicalKey) : logicalKey;
  if (m.findLinkDataForKey(canonical + "_P0")) return canonical + "_P0";
  if (canonical !== logicalKey && m.findLinkDataForKey(logicalKey + "_P0"))
    return logicalKey + "_P0";
  return logicalKey;
}

/* ================= 2. 核心类：SmartLink (处理轨道及内部梯级) ================= */
class SmartLink extends go.Link {
  constructor() { super(); }

  // 重写路径计算逻辑
  computePoints() {
    const A = this.fromNode, B = this.toNode;
    if (!A || !B) return false;

    // 获取端口的基础位置
    const pA = this.getLinkPoint(A, this.fromPort, this.computeSpot(true), true, false, B, this.toPort);
    const pB = this.getLinkPoint(B, this.toPort, this.computeSpot(false), false, false, A, this.fromPort);
    const dx = pB.x - pA.x, dy = pB.y - pA.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len; // 获取垂直于连线的法线单位向量

    this.clearPoints(); // 核心：清空默认路径，确保不会画出中轴线
    const halfGap = (this.data.gap ?? CONFIG.gap) / 2;

    if (this.data.kind === "parallel") {
      // 场景：绘制偏移的平行轨道
      // 根据 index (0或1) 决定向左还是向右偏移
      const offset = this.data.index === 0 ? -halfGap : halfGap;
      this.addPoint(new go.Point(pA.x + nx * offset, pA.y + ny * offset));
      this.addPoint(new go.Point(pB.x + nx * offset, pB.y + ny * offset));
    } else if (this.data.kind === "ladder") {
      // 场景：绘制轨道内部的黑色短横木
      const d = this.data.d ?? 20; // 距离端点的距离
      const t = (this.data.reverse ? (len - d) : d) / len; // 计算插值比例
      const cx = pA.x + dx * t, cy = pA.y + dy * t; // 确定中心点
      // 绘制横跨两条轨道的短线
      this.addPoint(new go.Point(cx - halfGap * nx, cy - halfGap * ny));
      this.addPoint(new go.Point(cx + halfGap * nx, cy + halfGap * ny));
    } else {
      // 场景：普通线（不带 kind 属性），正常画中轴线
      this.addPoint(pA); this.addPoint(pB);
    }
    return true;
  }
}

/* ================= 3. 核心类：LadderLink (处理红色跨边梯线) ================= */
class LadderLink extends go.Link {
  constructor() { 
    super(); 
    this.layerName = "Foreground"; // 置于顶层
    this.selectable = false;       // 不可选中
  }

  // 占位函数：不绘制 Link 默认路径
  computePoints() { this.clearPoints(); this.addPoint(new go.Point(0,0)); this.addPoint(new go.Point(0,0)); return true; }

  // 自定义绘制多根梯线
  makeGeometry() {
    const geo = new go.Geometry();
    const lk = (k) => resolveParallelLinkKey(this.diagram, k);
    const left = this.diagram.findLinkForKey(lk(this.data.leftLinkKey));
    const right = this.diagram.findLinkForKey(lk(this.data.rightLinkKey));
    if (!left || !right) return geo;

    // 寻找这两条线的公共交点
    const shared = (left.fromNode===right.fromNode || left.fromNode===right.toNode) ? left.fromNode : left.toNode;
    const count = this.data.ladderCount ?? CONFIG.edgeLadder.ladderCount;
    const base = this.data.startOffset ?? CONFIG.edgeLadder.startOffset;
    const spacing = this.data.ladderSpacing ?? CONFIG.edgeLadder.ladderSpacing;

    for (let i=0; i<count; i++) {
      const dist = base + i * spacing;
      // 关键：getSmartPoint 会自动吸附物理距离最近的平行线边缘
      const p1 = this.getSmartPoint(left, right, shared, dist);
      const p2 = this.getSmartPoint(right, left, shared, dist);
      const fig = new go.PathFigure(p1.x, p1.y, false);
      fig.add(new go.PathSegment(go.PathSegment.Line, p2.x, p2.y));
      geo.add(fig);
    }
    return geo;
  }

  // 核心逻辑：自动判断并偏移坐标
  getSmartPoint(link, otherLink, shared, dist) {
    const otherNode = (link.fromNode === shared) ? link.toNode : link.fromNode;
    const dx = otherNode.location.x - shared.location.x, dy = otherNode.location.y - shared.location.y;
    const len = Math.hypot(dx, dy) || 1;
    const dir = new go.Point(dx/len, dy/len); // 本条线的方向
    let pt = new go.Point(shared.location.x + dir.x * dist, shared.location.y + dir.y * dist);

    // 如果该边是平行线，执行智能偏移
    if (link.data.kind === "parallel") {
      const nx = -dir.y, ny = dir.x; // 获取法线
      const halfGap = (link.data.gap ?? CONFIG.gap) / 2;
      // 获取另一条线的方向，通过点积判断夹角
      const oOtherNode = (otherLink.fromNode === shared) ? otherLink.toNode : otherLink.fromNode;
      const oDx = oOtherNode.location.x - shared.location.x, oDy = oOtherNode.location.y - shared.location.y;
      const oLen = Math.hypot(oDx, oDy) || 1;
      // 如果法线与另一条线的夹角是钝角，则取负偏移，使其靠近对方
      const offset = (nx * (oDx/oLen) + ny * (oDy/oLen) > 0) ? halfGap : -halfGap;
      pt.offset(nx * offset, ny * offset);
    }
    return pt;
  }
}

/* ================= 4. 封装函数：一键转换平行线 ================= */
function addParallelRailsForEdge(m, linkKey, from, to, customOpts = {}) {
  const startOffset = customOpts.startOffset ?? CONFIG.internalLadder.startOffset;
  const ladderSpacing = customOpts.ladderSpacing ?? CONFIG.internalLadder.ladderSpacing;
  const ladderCount = customOpts.ladderCount ?? CONFIG.internalLadder.ladderCount;
  const gap = customOpts.gap ?? CONFIG.gap;
  m.addLinkData({ key: linkKey + "_P0", from, to, kind: "parallel", index: 0, gap: gap });
  m.addLinkData({ key: linkKey + "_P1", from, to, kind: "parallel", index: 1, gap: gap });
  for (let j = 0; j < ladderCount; j++) {
    const d = startOffset + j * ladderSpacing;
    m.addLinkData({ from, to, kind: "ladder", d: d, gap: gap });
    m.addLinkData({ from, to, kind: "ladder", d: d, reverse: true, gap: gap });
  }
}

/**
 * convertLinkToParallel: 将 Model 中的普通 Link 自动转换为双平行轨道结构
 * 会自动处理：1.删除原中线 2.生成两侧物理轨道 3.生成内部梯级
 */
function convertLinkToParallel(linkKey, customOpts = {}) {
  const m = diagram.model;
  const oldData = m.findLinkDataForKey(linkKey);
  if (!oldData) return;
  const from = oldData.from, to = oldData.to;
  m.removeLinkData(oldData);
  addParallelRailsForEdge(m, linkKey, from, to, customOpts);
}

/**
 * chain：移除两条中线（一正一反或两条同向），只保留一对平行轨。
 * 轨 key 为 canonicalKey（如 L1_P0/L1_P1）；otherKey（如 L5）注册别名以便红线仍可写 leftLinkKey: "L5"。
 */
function convertChainToParallel(canonicalKey, otherKey, customOpts = {}) {
  const m = diagram.model;
  const dF = m.findLinkDataForKey(canonicalKey);
  const dR = m.findLinkDataForKey(otherKey);
  if (!dF || !dR || !sameChainEndpoints(dF, dR)) return;
  const from = dF.from, to = dF.to;
  m.removeLinkData(dF);
  m.removeLinkData(dR);
  registerChainKeyAliases(diagram, canonicalKey, otherKey);
  addParallelRailsForEdge(m, canonicalKey, from, to, customOpts);
}

/* ================= 5. Diagram 初始化与运行 ================= */
const diagram = $(go.Diagram, "diagramDiv", { "undoManager.isEnabled": true });

// 确保拖拽节点时，所有动态生成的梯线重新计算
diagram.toolManager.draggingTool.doMouseMove = function() {
  go.DraggingTool.prototype.doMouseMove.call(this);
  diagram.links.each(l => { if (l instanceof LadderLink || l.data.kind) l.invalidateRoute(); });
};

// Node 模板
diagram.nodeTemplate = $(go.Node, "Auto", { locationSpot: go.Spot.Center },
  new go.Binding("location", "loc", go.Point.parse).makeTwoWay(go.Point.stringify),
  $(go.Shape, "RoundedRectangle", { fill: "#fff", stroke: "#333", strokeWidth: 2 }),
  $(go.TextBlock, { margin: 10 }, new go.Binding("text", "key"))
);

// Link 模板绑定：SmartLink 处理轨道，LadderLink 处理红色装饰线
diagram.linkTemplate = $(SmartLink, { selectable: false }, $(go.Shape, { stroke: "#333", strokeWidth: 2 }));
diagram.linkTemplateMap.add("ladder", $(LadderLink, $(go.Shape, { stroke: "red", strokeWidth: 3 })));

/* ================= 6. 数据源 ================= */
diagram.model = new go.GraphLinksModel(
  [{ key: "A", loc: "300 80" }, { key: "B", loc: "120 300" }, { key: "C", loc: "300 300" }, { key: "D", loc: "480 300" }],
  [
    { key: "L1", from: "A", to: "B", category: "chain" },
    { key: "L5", from: "B", to: "A", category: "chain" },
    { key: "L2", from: "A", to: "C" },
    { key: "L3", from: "A", to: "D" },
    { key: "L4", from: "B", to: "C" },
    { category: "ladder", leftLinkKey: "L1", rightLinkKey: "L2" },
    { category: "ladder", leftLinkKey: "L2", rightLinkKey: "L3" }
  ]
);
diagram.model.linkKeyProperty = "key";

// 初始加载完成后，统一转换特定连线为平行线
diagram.addDiagramListener("InitialLayoutCompleted", () => {
  diagram._parallelKeyAlias = new Map();
  convertChainToParallel("L1", "L5");
  convertLinkToParallel("L2");
  convertLinkToParallel("L3", { ladderCount: 2, gap: 30 });
  diagram.links.each(l => l.invalidateRoute());
});
</script>
</body>
</html>
