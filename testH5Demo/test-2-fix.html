<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/gojs@3.0.24/release/go.js"></script>
<style>
html,body,#diagramDiv{width:100%;height:100%;margin:0;}
</style>
</head>

<body>
<div id="diagramDiv"></div>

<script>
const $ = go.GraphObject.make;

/* ================= 参数 ================= */
const CONFIG = {
  gap: 20,
  ladderWidth: 10,
  startOffset: 60,
  ladderSpacing: 30,
  ladderCount: 2
};

/* ================= 核心Link ================= */
class SmartLink extends go.Link {

  computePoints() {
    const A = this.fromNode;
    const B = this.toNode;
    if (!A || !B) return false;

    const pA = this.getLinkPoint(
      A, this.fromPort, this.computeSpot(true),
      true, false, B, this.toPort
    );

    const pB = this.getLinkPoint(
      B, this.toPort, this.computeSpot(false),
      false, false, A, this.fromPort
    );

    const dx = pB.x - pA.x;
    const dy = pB.y - pA.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) return false;

    const ux = dx / len;
    const uy = dy / len;
    const nx = -uy;
    const ny =  uy;

    this.clearPoints();

    const gap = this.data.gap ?? CONFIG.gap;
    const halfGap = gap / 2;

    /* ================= 平行线 ================= */
    if (this.data.kind === "parallel") {

      const offset = this.data.index === 0 ? -halfGap : halfGap;

      this.addPoint(new go.Point(
        pA.x + nx * offset,
        pA.y + ny * offset
      ));

      this.addPoint(new go.Point(
        pB.x + nx * offset,
        pB.y + ny * offset
      ));
    }

    /* ================= 普通线 ================= */
    else if (!this.data.kind) {
      this.addPoint(pA);
      this.addPoint(pB);
    }

    /* ================= 梯线 ================= */
    else if (this.data.kind === "ladder") {

      const d = this.data.d;

      const realD = this.data.reverse ? (len - d) : d;

      const t = realD / len;
      if (t <= 0 || t >= 1) return false;

      const ladderHalf = Math.min(
        this.data.ladderWidth ?? CONFIG.ladderWidth,
        halfGap
      );

      const cx = pA.x + dx * t;
      const cy = pA.y + dy * t;

      this.addPoint(new go.Point(
        cx - nx * ladderHalf,
        cy - ny * ladderHalf
      ));

      this.addPoint(new go.Point(
        cx + nx * ladderHalf,
        cy + ny * ladderHalf
      ));
    }

    return true;
  }
}

/* ================= Diagram ================= */
const diagram = $(go.Diagram, "diagramDiv", {
  "undoManager.isEnabled": true
});

/* ================= Node ================= */
diagram.nodeTemplate =
  $(go.Node, "Auto",
    { locationSpot: go.Spot.Center },
    new go.Binding("location","loc",go.Point.parse).makeTwoWay(go.Point.stringify),
    $(go.Shape,"RoundedRectangle",{fill:"#fff",stroke:"#333",strokeWidth:2}),
    $(go.TextBlock,{margin:10},new go.Binding("text","key"))
  );

/* ================= Link ================= */
diagram.linkTemplate =
  $(SmartLink,
    { selectable:false },
    $(go.Shape,{stroke:"#333",strokeWidth:2})
  );

/* ================= 数据 ================= */
diagram.model = new go.GraphLinksModel(
[
  { key:"A", loc:"300 80" },
  { key:"B", loc:"120 300" },
  { key:"C", loc:"300 300" },
  { key:"D", loc:"480 300" }
],
[
  /* 普通 */
  { from:"A", to:"B" },

  /* AC 平行（拆成两条） */
  { from:"A", to:"C", kind:"parallel", index:0, id:"AC1" },
  { from:"A", to:"C", kind:"parallel", index:1, id:"AC2" },

  { from:"B", to:"C", id:"BC" },
  { from:"C", to:"D", id:"CD" }
]
);

/* ================= 梯线生成 ================= */
function addLadders(from, to, index) {

  const m = diagram.model;

  const {
    startOffset,
    ladderSpacing,
    ladderCount,
    ladderWidth
  } = CONFIG;

  for (let i=0;i<ladderCount;i++) {

    const d = startOffset + i*ladderSpacing;

    m.addLinkData({
      from, to,
      kind:"ladder",
      index,
      d,
      ladderWidth
    });

    m.addLinkData({
      from, to,
      kind:"ladder",
      index,
      d,
      ladderWidth,
      reverse:true
    });
  }
}

/* ================= 构建梯线 ================= */
diagram.addDiagramListener("InitialLayoutCompleted", () => {

  // AC1 - BC
  addLadders("A","C",0);

  // AC2 - CD
  addLadders("A","C",1);

});

/* ================= 拖动刷新 ================= */
diagram.addDiagramListener("SelectionMoved", () => {
  diagram.links.each(l => l.invalidateRoute());
});
</script>
</body>
</html>
